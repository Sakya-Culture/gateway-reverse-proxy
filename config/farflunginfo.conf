upstream drkweb {
    server drkweb:80;
}

server {
    listen 80;
    server_name farflunginfo.cinekwok.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name farflunginfo.cinekwok.com;
    
    ssl_certificate /etc/nginx/certs/cinekwok.cer;
    ssl_certificate_key /etc/nginx/certs/cinekwok.key;

    location / {
        proxy_pass http://drkweb;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
